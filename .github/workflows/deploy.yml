name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Voer uit bij wijzigingen in de 'main'-branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build project
        run: |
          # Voeg hier build-commando's toe (indien nodig)
          # Voorbeeld: npm install && npm run build
          echo "Bouwen overslaan: geen specifieke build opgegeven."

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v3
      
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./  # Pad naar bestanden die je wilt publiceren
        
      - name: Publish GitHub Pages
        uses: actions/deploy-pages@v3
